version: '3.9'
services:
  postgres:
    image: postgres:15
    container_name: suiver-postgres
    restart: always
    environment:
      POSTGRES_DB: suiver
      POSTGRES_USER: suiver
      POSTGRES_PASSWORD: suiver040
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  suiver-backend:
    build: .
    container_name: suiver-backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://suiver:suiver040@postgres:5432/suiver
    depends_on:
      - postgres
    command: npm run start:dev

volumes:
  postgres_data:
